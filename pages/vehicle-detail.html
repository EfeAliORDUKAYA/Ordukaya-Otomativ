<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Araç Detayı</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: radial-gradient(circle at top right, #13265d 0%, #071129 40%), #071129;
            font-family: Inter;
            color: white;
        }
        
        .container {
            padding: 30px;
        }
        
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .left-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .back-btn {
            border: none;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }
        
        .back-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
        
        .page-title {
            font-size: 34px;
            font-weight: 800;
        }
        
        .top-card {
            display: flex;
            gap: 30px;
            background: rgba(17, 28, 68, .95);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, .05);
        }
        
        .car-image {
            width: 420px;
            height: 280px;
            object-fit: cover;
            border-radius: 22px;
            background: #0f172a;
        }
        
        .info {
            flex: 1;
        }
        
        .plate {
            font-size: 46px;
            font-weight: 800;
        }
        
        .owner {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 17px;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 26px;
        }
        
        .detail-box {
            background: #0f172a;
            padding: 20px;
            border-radius: 18px;
        }
        
        .label {
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .edit-section,
        .service-box {
            background: rgba(17, 28, 68, .95);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, .05);
        }
        
        .section-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 22px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        
        .service-form {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .input {
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 14px;
        }
        
        .save-btn {
            border: none;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
        }
        
        .danger-btn {
            border: none;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: .25s;
            box-shadow: 0 8px 20px rgba(239, 68, 68, .3);
        }
        
        .danger-btn:hover {
            transform: translateY(-3px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 18px;
            text-align: left;
        }
        
        th {
            color: #94a3b8;
            font-weight: 600;
        }
        
        tr {
            border-bottom: 1px solid rgba(255, 255, 255, .05);
        }
        
        tr:hover {
            background: rgba(255, 255, 255, .03);
        }
        
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 24px;
        }
        
        .modern-btn {
            border: none;
            padding: 14px 22px;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: .25s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
        }
        
        .modern-btn:hover {
            transform: translateY(-3px);
        }
        
        .btn-orange {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }
        
        .btn-blue {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
        }
        
        .btn-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #9333ea);
        }
        
        .btn-whatsapp {
            background: linear-gradient(135deg, #22c55e, #15803d);
        }
        
        @media(max-width:1100px) {
            .top-card {
                flex-direction: column;
            }
            .car-image {
                width: 100%;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .service-form {
                grid-template-columns: 1fr;
            }
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topbar">

            <div class="left-top">

                <button class="back-btn" onclick="history.back()">
                ← Geri
            </button>

                <div class="page-title">
                    🚗 Araç Detayı
                </div>

            </div>

            <button id="deleteVehicleBtn" class="danger-btn">
            Aracı Sil
        </button>

        </div>

        <div class="top-card">

            <img id="carImage" class="car-image">

            <div class="info">

                <div class="plate" id="plate">
                    -
                </div>

                <div class="owner" id="owner">
                    -
                </div>

                <div id="statusText" style="
                        margin-top:14px;
                        display:inline-flex;
                        align-items:center;
                        gap:8px;
                        padding:12px 18px;
                        border-radius:14px;
                        font-weight:700;
                        font-size:15px;
                        background:#f59e0b;
                        color:white;
                    ">
                    ● Serviste
                </div>
                <div class="detail-grid">

                    <div class="detail-box">
                        <div class="label">Marka</div>
                        <div class="value" id="brand">-</div>
                    </div>

                    <div class="detail-box">
                        <div class="label">Model</div>
                        <div class="value" id="model">-</div>
                    </div>

                    <div class="detail-box">
                        <div class="label">Yıl</div>
                        <div class="value" id="year">-</div>
                    </div>
                    <div class="detail-box">
                        <div class="label">Güncel KM</div>
                        <div class="value" id="currentKmText">0 KM</div>
                    </div>

                    <div class="detail-box">
                        <div class="label">Sonraki Yağ Bakımı</div>
                        <div class="value" id="nextOilKmText">0 KM</div>
                    </div>

                    <div class="detail-box">
                        <div class="label">Toplam Servis Tutarı</div>
                        <div class="value" id="balance">₺0</div>
                    </div>

                </div>
                <div class="action-buttons"></div>

                <button onclick="setVehicleStatus('Serviste')" class="modern-btn btn-orange">
🛠 Serviste
</button>




                <button onclick="setVehicleStatus('Hazır')" class="modern-btn btn-blue">
✅ Hazır
</button>

                <button onclick="setVehicleStatus('Teslim Edildi')" class="modern-btn btn-green">
🚗 Teslim Edildi
</button>
                <div id="printArea" style="
    display:none;
    margin-top:20px;
    gap:12px;
">

                    <button id="servicePrintBtn" class="modern-btn btn-purple">
🧾 Servis Fişi
</button>

                    <button id="whatsappBtn" onclick="sendWhatsApp()" class="modern-btn btn-whatsapp">
📲 WhatsApp Gönder
</button>

                </div>

            </div>

        </div>

    </div>

    <div class="edit-section">

        <div class="section-title">
            ✏️ Araç Bilgilerini Düzenle
        </div>

        <div class="form-grid">

            <input id="editPlate" class="input" placeholder="Plaka">


            <input id="editBrand" class="input" placeholder="Marka">

            <input id="editModel" class="input" placeholder="Model">

            <input id="editYear" class="input" placeholder="Yıl">
            <input id="editCurrentKm" class="input" placeholder="Güncel KM">

            <button id="oilServiceBtn" class="modern-btn btn-orange">
🛢 Yağ Bakımı Yapıldı
</button>

            <button onclick="sendOilReminder()" class="modern-btn btn-blue">
🔔 Yağ Bakım Hatırlat
</button>

            <button id="saveEditBtn" class="modern-btn btn-green">
💾 Güncelle
</button>

        </div>

    </div>
    <div class="service-box">

        <div class="section-title">
            📅 Araç Randevuları
        </div>

        <div id="vehicleAppointments"></div>

    </div>
    <div class="service-box">

        <div class="section-title">
            🔧 Servis Geçmişi
        </div>

        <div class="service-form">

            <input id="serviceName" class="input" placeholder="İşlem">

            <input id="partName" class="input" placeholder="Kullanılan Parça">

            <input id="price" class="input" placeholder="Fiyat">

            <button id="saveService" class="save-btn">
                Servis Ekle
            </button>

        </div>

        <table>

            <thead>
                <tr>
                    <th>İşlem</th>
                    <th>Parça</th>
                    <th>Fiyat</th>
                    <th>Tarih</th>
                </tr>
            </thead>

            <tbody id="serviceBody"></tbody>

        </table>

    </div>

    </div>

    <script src="../assets/vehicle-detail.js"></script>

</body>

</html>
