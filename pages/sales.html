<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <title>Satış Modülü</title>

    <link rel="stylesheet" href="../assets/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        body {
            background: #071129;
            font-family: Inter;
            color: white;
        }
        
        .main {
            padding: 30px;
        }
        
        .page-topbar {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 30px;
        }
        
        .back-btn {
            border: none;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            font-family: Inter;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
        
        .page-title-big {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }
        
        .product-form-card {
            background: #111c44;
            border-radius: 24px;
            padding: 30px;
        }
        
        .form-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }
        
        .field label {
            color: #94a3b8;
        }
        
        input {
            background: #0f172a;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 14px;
            outline: none;
            font-size: 15px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .sale-info {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            color: #94a3b8;
            font-size: 15px;
        }
        
        .save-btn {
            margin-top: 25px;
            border: none;
            background: #2563eb;
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: .2s;
        }
        
        .save-btn:hover {
            background: #1d4ed8;
        }
        
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #111827;
            border-radius: 14px;
            overflow: hidden;
            max-height: 220px;
            overflow-y: auto;
            z-index: 999;
            margin-top: 6px;
            border: 1px solid #1e293b;
            display: none;
        }
        
        .search-item {
            padding: 14px;
            cursor: pointer;
            transition: .2s;
            border-bottom: 1px solid #1e293b;
        }
        
        .search-item:hover {
            background: #1e293b;
        }
        /* ==========================================================================
   🎨 ORDUKAYA OTOMOTİV TEMA DEĞİŞKENLERİ
   ========================================================================== */
        
         :root {
            --bg-main: #070b14;
            --bg-sidebar: #0b1120;
            --bg-card: #111827;
            --bg-table-th: #070b14;
            --bg-input: #0f172a;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-sidebar: #ffffff;
            --text-sidebar-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.05);
            --sidebar-hover: #1e293b;
        }
        /* ☀️ LIGHT MODE (AÇIK TEMA AKTİFKEN) */
        
        body.light-mode,
        body.light,
        body.light-theme {
            --bg-main: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-table-th: #e2e8f0;
            --bg-input: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-sidebar: #0f172a;
            --text-sidebar-muted: #64748b;
            --border-color: #cbd5e1;
            --sidebar-hover: #e2e8f0;
        }
        /* ==========================================================================
   ÇEKİRDEK STİLLER
   ========================================================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            transition: background 0.2s ease, color 0.2s ease;
        }
        /* SIDEBAR (SOL MENÜ) */
        
        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 0;
            transition: background 0.2s ease;
            z-index: 10;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 45px;
        }
        
        .logo-box {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            overflow: hidden;
            background: #111827;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
        }
        
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .logo-area h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-sidebar);
        }
        
        .logo-area p {
            color: var(--text-sidebar-muted);
            margin-top: 4px;
            font-size: 14px;
        }
        
        .sidebar ul {
            list-style: none;
        }
        
        .sidebar li {
            padding: 16px 18px;
            margin-top: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-sidebar);
        }
        
        .sidebar li span {
            color: inherit;
        }
        
        .sidebar li:hover {
            background: var(--sidebar-hover);
        }
        
        .active {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9) !important;
            color: #000000 !important;
            font-weight: 700 !important;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
        }
        
        .active span {
            color: #000000 !important;
        }
        
        .bottom-text {
            color: var(--text-sidebar-muted);
            font-size: 13px;
        }
        /* MAIN CONTENT */
        
        .main {
            flex: 1;
            padding: 35px;
            height: 100vh;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        /* TOPBAR */
        
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }
        
        .topbar h2 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }
        
        .topbar p {
            margin-top: 5px;
            color: var(--text-muted);
        }
        
        .admin-btn {
            border: none;
            padding: 14px 22px;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
        }
        /* 🌟 KARTLAR (ARTIK DEĞİŞKENLERE BAĞLI, BEYAZ MODDA ARKA PLANI BEYAZ YAZISI SİYAH OLACAK) */
        
        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px;
            transition: transform 0.3s, border-color 0.3s, background 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            background: rgba(56, 189, 248, 0.06);
            border-radius: 50%;
            top: -80px;
            right: -80px;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
        }
        
        .card span {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        
        .card h1 {
            margin-top: 18px;
            color: #0ea5e9;
            font-size: 34px;
        }
        /* 🌟 TABLOLAR & ALANLAR */
        
        .table-area {
            margin-top: 35px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        
        .table-header h2 {
            color: var(--text-main);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            overflow: hidden;
            border-radius: 16px;
        }
        
        th {
            text-align: left;
            padding: 18px;
            background: var(--bg-table-th);
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
        }
        
        td {
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }
        
        tbody tr {
            transition: 0.2s;
        }
        
        tbody tr:hover {
            background: var(--sidebar-hover);
        }
        /* STATUS PANELS */
        
        .status-board {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .status-card {
            flex: 1;
            padding: 25px;
            border-radius: 20px;
            color: white !important;
            font-size: 28px;
            font-weight: 700;
        }
        
        .status-card h3,
        .status-card div {
            color: white !important;
        }
        
        .serviste {
            background: #f59e0b;
        }
        
        .hazir {
            background: #2563eb;
        }
        
        .teslim {
            background: #22c55e;
        }
    </style>

</head>

<body>

    <div class="main">

        <div class="page-topbar">

            <button class="back-btn" onclick="history.back()">
                ← Geri
            </button>

            <div class="page-title-big">
                Satış İşlemi
            </div>

        </div>

        <div class="product-form-card">

            <div class="form-title">
                Yeni Satış
            </div>

            <!-- CUSTOMER -->

            <div class="field">

                <label>Müşteri Ara</label>

                <input type="text" id="customerSearch" placeholder="Müşteri adı yaz...">

                <div class="search-dropdown" id="customerDropdown"></div>

            </div>

            <!-- PRODUCT -->

            <div class="form-grid">

                <div class="field">

                    <label>Ürün Ara</label>

                    <input type="text" id="productSearch" placeholder="Ürün adı yaz...">

                    <div class="search-dropdown" id="productDropdown"></div>

                </div>

                <div class="field">

                    <label>Adet</label>

                    <input type="number" id="qty" value="1" min="1">

                </div>

            </div>



            <!-- INFO -->

            <div class="sale-info">

                <div id="stockInfo">
                    Stok: -
                </div>

                <div id="priceInfo">
                    Satış: -
                </div>

            </div>
            <div class="field" style="margin-top:20px;">

                <label style="
                    display:flex;
                    align-items:center;
                    gap:12px;
                    cursor:pointer;
                    color:white;
                    font-weight:600;
                    ">

                    <input
                        type="checkbox"
                        id="paidCheck"
                        checked
                        style="
                            width:18px;
                            height:18px;
                            cursor:pointer;
                        "
                    >

                    Ödeme Alındı

                </label>

            </div>

            <!-- BUTTON -->

            <button id="sellBtn" class="save-btn">
                Satışı Tamamla
            </button>
            <button id="printInvoiceBtn" class="save-btn" style="
    background:#16a34a;
    margin-top:12px;
">
    🖨️ Fatura Yazdır
</button>

        </div>

    </div>

    <div id="toast"></div>

    <script src="../assets/sales.js"></script>

</body>

</html>
