<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Yükleniyor...</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Inter, sans-serif;
            overflow: hidden;
        }
        
        .loading-container {
            text-align: center;
        }
        
        .logo-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: auto;
        }
        
        .logo-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: grayscale(100%) brightness(.25);
        }
        
        .logo-fill {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            clip-path: inset(100% 0 0 0);
            animation: fillLogo 3s ease forwards;
        }
        
        @keyframes fillLogo {
            0% {
                clip-path: inset(100% 0 0 0);
            }
            100% {
                clip-path: inset(0 0 0 0);
            }
        }
        
        .company {
            margin-top: 25px;
            font-size: 32px;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
        }
        
        .subtitle {
            margin-top: 10px;
            color: #94a3b8;
        }
        
        .progress {
            margin-top: 30px;
            width: 300px;
            height: 10px;
            background: #111827;
            border-radius: 50px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient( 90deg, #2563eb, #3b82f6, #60a5fa);
            animation: progressBar 3s linear forwards;
        }
        
        @keyframes progressBar {
            from {
                width: 0%;
            }
            to {
                width: 100%;
            }
        }
        
        .percent {
            margin-top: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }
        
        .fade-out {
            animation: fadeOut .5s forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>

    <div class="loading-container">

        <div class="logo-wrapper">

            <img src="../images/Logo1.png" class="logo-bg">

            <img src="../images/Logo1.png" class="logo-fill">

        </div>

        <div class="company">
            ORDUKAYA OTOMOTİV
        </div>

        <div class="subtitle">
            Sistem Başlatılıyor...
        </div>

    </div>

    <script>
        let p = 0;

        const percent =
            document.getElementById("percent");

        const interval =
            setInterval(() => {

                p++;

                percent.innerText =
                    "%" + p;

                if (p >= 100) {

                    clearInterval(interval);

                    document.body.classList.add(
                        "fade-out"
                    );

                }

            }, 30);
    </script>

</body>

</html>
