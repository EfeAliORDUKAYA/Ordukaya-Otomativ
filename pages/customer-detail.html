<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Müşteri Detay</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Inter;
            background: #081028;
            color: white;
            padding: 30px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .back-btn {
            background: #111827;
            border: 1px solid #1e293b;
            color: white;
            padding: 13px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: .2s;
        }
        
        .back-btn:hover {
            background: #1e293b;
        }
        
        .page-title {
            font-size: 34px;
            font-weight: 700;
        }
        
        .top {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .profile {
            flex: 2;
            background: #111827;
            border-radius: 24px;
            padding: 30px;
        }
        
        .balance {
            flex: 1;
            background: #111827;
            border-radius: 24px;
            padding: 30px;
        }
        
        .name {
            font-size: 36px;
            font-weight: 700;
        }
        
        .phone {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 18px;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .stat {
            flex: 1;
            background: #1f2937;
            border-radius: 18px;
            padding: 20px;
        }
        
        .stat span {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .stat h2 {
            margin-top: 10px;
            font-size: 28px;
        }
        
        .section {
            background: #111827;
            border-radius: 24px;
            padding: 25px;
            margin-top: 25px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .vehicle-card {
            background: #0f172a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #1e293b;
            cursor: pointer;
            transition: .2s;
        }
        
        .vehicle-card:hover {
            transform: translateY(-5px);
            border-color: #2563eb;
        }
        
        .vehicle-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
        }
        
        .vehicle-body {
            padding: 18px;
        }
        
        .vehicle-plate {
            font-size: 24px;
            font-weight: 700;
        }
        
        .vehicle-model {
            margin-top: 8px;
            color: #94a3b8;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #1f2937;
        }
        
        th {
            color: #94a3b8;
        }
        
        .payment-input {
            background: #0f172a;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 14px;
            outline: none;
            font-size: 15px;
            width: 100%;
        }
        
        .payment-btn {
            border: none;
            background: #22c55e;
            color: white;
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            width: 100%;
            margin-top: 12px;
        }
        
        .payment-btn:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="topbar">

        <button class="back-btn" onclick="history.back()">
            ← Geri
        </button>

        <div class="page-title">
            Müşteri Detay
        </div>

    </div>

    <div class="top">

        <div class="profile">

            <div class="name" id="name"></div>

            <div class="phone" id="phone"></div>
            <!-- EDIT CUSTOMER -->

            <div style="
    margin-top:25px;
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
">

                <h3 style="
        margin-bottom:18px;
        font-size:20px;
    ">
                    ✏️ Müşteri Düzenle
                </h3>

                <div style="
        display:flex;
        flex-direction:column;
        gap:14px;
    ">

                    <input id="editName" type="text" placeholder="Müşteri Adı" style="
                background:#111827;
                border:none;
                color:white;
                padding:15px;
                border-radius:14px;
                outline:none;
                font-size:15px;
            ">

                    <input id="editPhone" type="text" placeholder="Telefon" style="
                background:#111827;
                border:none;
                color:white;
                padding:15px;
                border-radius:14px;
                outline:none;
                font-size:15px;
            ">

                    <button id="saveCustomerBtn" style="
                border:none;
                background:#2563eb;
                color:white;
                padding:15px;
                border-radius:14px;
                cursor:pointer;
                font-weight:700;
                font-size:15px;
            ">
            Kaydet
        </button>

                </div>

            </div>
            <div style="
    display:flex;
    gap:12px;
    margin-top:20px;
">

            </div>

            <div class="stats">

                <div class="stat">
                    <span>Toplam Harcama</span>
                    <h2 id="totalSpent">₺0</h2>
                </div>

                <div class="stat">
                    <span>Son Satın Alım</span>
                    <h2 id="lastBuy">-</h2>
                </div>

                <div class="stat">
                    <span>Borç</span>
                    <h2 id="debt">₺0</h2>
                </div>

            </div>

        </div>

        <div class="balance">

            <h2>Hesap Özeti</h2>

            <div style="margin-top:25px;">

                <p style="color:#94a3b8;">
                    Cari Bakiye
                </p>

                <h1 id="balanceText" style="
                    margin-top:10px;
                    font-size:42px;
                ">
                    ₺0
                </h1>

            </div>

            <div class="section">

                <div class="section-title">
                    💰 Ödeme Al
                </div>

                <div style="
        display:flex;
        gap:15px;
        align-items:center;
        margin-top:20px;
    ">

                    <input type="number" id="paymentAmount" placeholder="Ödeme Tutarı" style="
                flex:1;
                background:#0f172a;
                border:none;
                padding:16px;
                border-radius:14px;
                color:white;
                outline:none;
            ">

                    <button id="paymentBtn" style="
                border:none;
                background:#22c55e;
                color:white;
                padding:16px 24px;
                border-radius:14px;
                cursor:pointer;
                font-weight:700;
            ">
            Ödeme Al
        </button>

                </div>

            </div>
        </div>

    </div>

    <div class="section">

        <div class="section-title">
            🚗 Kayıtlı Araçlar
        </div>

        <div id="vehiclesArea" class="vehicles-grid"></div>

    </div>

    <div class="section">

        <div class="section-title">
            🔧 Servis Geçmişi
        </div>

        <table>

            <thead>

                <tr>
                    <th>Tarih</th>
                    <th>İşlem</th>
                    <th>Değişen Parça</th>
                    <th>Tutar</th>
                    <th>Plaka</th>
                </tr>

            </thead>

            <tbody id="serviceTable"></tbody>

        </table>

    </div>

    <script src="../assets/customerDetail.js"></script>

</body>

</html>
