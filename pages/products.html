<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Ürünler</title>

    <link rel="stylesheet" href="../assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="main">
        <div class="page-topbar">

            <button class="back-btn" onclick="history.back()">
                ← Geri
            </button>

            <div class="page-title-big">
                Ürünler
            </div>

        </div>
        <!-- TOOLBAR -->
        <div class="toolbar">

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ürün ara...">
            </div>

            <div class="filter-group">

                <button class="filter-btn active" data-filter="all">
                Tümü
            </button>

                <button class="filter-btn" data-filter="low">
                Düşük Stok
            </button>

            </div>

        </div>

        <!-- FORM -->
        <div class="product-form-card">

            <div class="form-title">Ürün Bilgileri</div>

            <div class="form-grid">

                <div class="field">
                    <label>Ürün Adı</label>
                    <input type="text" id="name">
                </div>

                <div class="field">
                    <label>Stok</label>
                    <input type="number" id="stock">
                </div>

                <div class="field">
                    <label>Alış Fiyatı</label>
                    <input type="number" id="buyPrice">
                </div>

                <div class="field">
                    <label>Satış Fiyatı</label>
                    <input type="number" id="sellPrice">
                </div>

            </div>

            <button id="saveBtn" class="save-btn">Ürünü Kaydet</button>

        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Ürün</th>
                    <th>Stok</th>
                    <th>Alış</th>
                    <th>Satış</th>
                    <th>İşlem</th>
                </tr>
            </thead>

            <tbody id="productBody"></tbody>
        </table>
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: #0f172a;">
            <button id="prevPageBtn" class="back-btn" style="margin:0; padding: 10px 20px;">← Önceki</button>
            <span id="pageInfo" style="font-weight: 600; color: #94a3b8;">Sayfa 1 / 1</span>
            <button id="nextPageBtn" class="back-btn" style="margin:0; padding: 10px 20px;">Sonraki →</button>
        </div>

    </div>

    <div id="toast"></div>

    <script src="../assets/products.js"></script>

</body>

</html>
