<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <title>Son Satışlar</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #081028;
            color: white;
            font-family: Inter;
            padding: 30px;
            overflow-y: auto;
        }
        
        .topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .back-btn {
            border: none;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
        }
        
        .title {
            font-size: 32px;
            font-weight: 700;
        }
        
        .table-box {
            background: #111827;
            border-radius: 24px;
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid #1f2937;
        }
        
        th {
            background: #0f172a;
            color: #94a3b8;
        }
        
        tr:hover {
            background: #0f172a;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: 700;
        }
        
        .print {
            background: #2563eb;
        }
        
        .pdf {
            background: #16a34a;
        }
        
        .delete {
            background: #dc2626;
        }
        /* Arama Alanı Kapsayıcısı */
        
        .search-wrapper {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 5px;
        }
        /* Modern Arama Kutusu */
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            /* Koyu modern arka plan */
            border: 1px solid #334155;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Arama İkonu */
        
        .search-icon {
            position: absolute;
            left: 15px;
            font-size: 16px;
            color: #64748b;
            pointer-events: none;
        }
        /* Giriş Alanı (Input) */
        
        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            /* İkon için soldan boşluk */
            background: transparent;
            border: none;
            outline: none;
            color: #f8fafc;
            font-size: 14px;
            font-family: inherit;
        }
        /* Yazı ipucu (Placeholder) Rengi */
        
        .search-box input::placeholder {
            color: #64748b;
            font-weight: 400;
        }
        /* Efektler: Fareyle Üzerine Gelindiğinde (Hover) */
        
        .search-box:hover {
            border-color: #475569;
            background: #243249;
        }
        /* Efektler: Tıklandığında / Odaklanıldığında (Focus) */
        
        .search-box:focus-within {
            border-color: #3b82f6;
            /* Modern teknoloji mavisi */
            background: #1e293b;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            /* Yumuşak parlama efekti */
        }
        /* Input odaklandığında ikonun rengini değiştirme */
        
        .search-box:focus-within .search-icon {
            color: #3b82f6;
        }
    </style>

</head>

<body>

    <div class="topbar">

        <button class="back-btn" onclick="history.back()">
            ← Geri
        </button>

        <div class="title">
            Son Satışlar
        </div>
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Müşteri adı veya ürün adı ile geçmişte ara..." autocomplete="off">
            </div>
        </div>
    </div>

    <div class="table-box">

        <table>

            <thead>

                <tr>

                    <th>Tarih</th>
                    <th>Müşteri</th>
                    <th>Ürün</th>
                    <th>Adet</th>
                    <th>Tutar</th>
                    <th>Durum</th>
                    <th>İşlem</th>

                </tr>

            </thead>

            <tbody id="salesTable"></tbody>

        </table>


    </div>
    <div style="display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: #0f172a;">
        <button id="prevPageBtn" class="back-btn" style="margin:0; padding: 10px 20px;">← Önceki</button>
        <span id="pageInfo" style="font-weight: 600; color: #94a3b8;">Sayfa 1 / 1</span>
        <button id="nextPageBtn" class="back-btn" style="margin:0; padding: 10px 20px;">Sonraki →</button>
    </div>
    <script src="../assets/salesHistory.js"></script>

</body>

</html>
