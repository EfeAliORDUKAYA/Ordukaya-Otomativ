<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <title>Kasa Yönetimi</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #081028;
            font-family: Inter;
            color: white;
            padding: 30px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .main {
            flex: 1;
            padding: 30px;
            height: 100vh;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        
        .topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .back-btn {
            border: none;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .page-title {
            font-size: 34px;
            font-weight: 800;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #111827;
            border-radius: 24px;
            padding: 25px;
        }
        
        .card span {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .card h1 {
            margin-top: 15px;
            font-size: 34px;
        }
        
        .box {
            background: #111827;
            border-radius: 24px;
            padding: 25px;
        }
        
        .box-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #1e293b;
        }
        
        th {
            color: #94a3b8;
        }
        
        .income {
            color: #22c55e;
            font-weight: 700;
        }
        
        .expense {
            color: #ef4444;
            font-weight: 700;
        }
    </style>

</head>

<body>

    <div class="topbar">

        <button class="back-btn" onclick="history.back()">
            ← Geri
        </button>

        <div class="page-title">
            💰 Kasa Yönetimi
        </div>

    </div>

    <div class="cards">

        <div class="card">
            <span>Toplam Kasa</span>
            <h1 id="totalCash">₺0</h1>
        </div>

        <div class="card">
            <span>Satış Geliri</span>
            <h1 id="salesCash">₺0</h1>
        </div>

        <div class="card">
            <span>Servis Geliri</span>
            <h1 id="serviceCash">₺0</h1>
        </div>

        <div class="card">
            <span>Alınan Ödemeler</span>
            <h1 id="paymentCash">₺0</h1>
        </div>

    </div>

    <div class="box">

        <div class="box-title">
            📋 Kasa Hareketleri
        </div>

        <table>

            <thead>

                <tr>
                    <th>Tarih</th>
                    <th>Tür</th>
                    <th>Açıklama</th>
                    <th>Tutar</th>
                </tr>

            </thead>

            <tbody id="cashTable"></tbody>

        </table>
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px;">
            <button id="prevPageBtn" class="back-btn" style="margin:0; padding: 10px 20px;">← Önceki</button>
            <span id="pageInfo" style="font-weight: 600; color: #94a3b8;">Sayfa 1 / 1</span>
            <button id="nextPageBtn" class="back-btn" style="margin:0; padding: 10px 20px;">Sonraki →</button>
        </div>

    </div>

    <script src="../assets/cash.js"></script>

</body>

</html>
