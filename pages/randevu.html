<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Randevular</title>

    <link rel="stylesheet" href="../assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Sayfa Düzeni Ek CSS Tercihleri */
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        .date-box {
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            border: 1px solid #334155;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 500;
        }
        
        .date-box:hover {
            background: #243249;
            border-color: #475569;
        }
        
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        #calendar {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        #calendar div:hover {
            background: #1e293b !important;
            transform: translateY(-1px);
        }
        /* İstatistik Paneli Kart Grubu Fix */
        
        .status-board-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        /* Modern Arama Çubuğu Tasarımı */
        
        .search-wrapper {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            font-size: 16px;
            color: #64748b;
            pointer-events: none;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            background: transparent;
            border: none;
            outline: none;
            color: #f8fafc;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }
        
        .search-box input::placeholder {
            color: #64748b;
        }
        
        .search-box:hover {
            border-color: #475569;
            background: #243249;
        }
        
        .search-box:focus-within {
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        
        .search-box:focus-within .search-icon {
            color: #3b82f6;
        }
        /* Tablo ve Sayfalama Altlığı */
        
        .table-container {
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>

<body>

    <div class="main">

        <div class="page-topbar">
            <button class="back-btn" onclick="history.back()">← Geri</button>
            <div class="page-title-big">Randevular</div>
        </div>

        <div class="product-form-card" style="margin-bottom: 25px;">
            <div class="form-title">Randevu Oluştur</div>
            <div class="form-grid">
                <div class="field">
                    <label>Müşteri</label>
                    <select id="customer"></select>
                </div>

                <div class="field">
                    <label>Araç</label>
                    <select id="vehicle"></select>
                </div>

                <div class="field">
                    <label>Tarih</label>
                    <div class="date-box" id="dateBox">
                        <span id="dateText">📅 Tarih seç</span>
                    </div>
                    <input type="datetime-local" id="hiddenDate" style="display:none;">
                </div>

                <div class="field">
                    <label>Not</label>
                    <input type="text" id="note" placeholder="Örn: Yağ bakımı ve balata değişimi">
                </div>
            </div>
            <button id="addBtn" class="save-btn">Randevu Ekle</button>
        </div>

        <div class="status-board-container">
            <div class="status-board" style="margin: 0;">
                <div class="status-card serviste">
                    <span>Bugün</span>
                    <div id="todayCount">0</div>
                </div>
                <div class="status-card hazir">
                    <span>Yarın</span>
                    <div id="tomorrowCount">0</div>
                </div>
                <div class="status-card teslim">
                    <span>Toplam</span>
                    <div id="totalCount">0</div>
                </div>
            </div>

            <div class="status-board" style="margin: 0;">
                <div class="status-card serviste" style="border-left-color: #ef4444;">
                    <span>Bekliyor</span>
                    <div id="waitingCount">0</div>
                </div>
                <div class="status-card hazir" style="border-left-color: #3b82f6;">
                    <span>Onaylandı</span>
                    <div id="incomingCount">0</div>
                </div>
                <div class="status-card teslim" style="border-left-color: #22c55e;">
                    <span>Tamamlandı</span>
                    <div id="completedCount">0</div>
                </div>
            </div>
        </div>

        <div class="layout">
            <div class="product-form-card">
                <div class="form-title">📅 Planlanmış Günler</div>
                <div id="calendar"></div>
            </div>

            <div class="product-form-card" style="display: flex; flex-direction: column;">
                <div class="form-title">📊 Günlük Yoğunluk</div>
                <div style="flex: 1; overflow-y: auto; max-height: 250px;">
                    <table style="margin: 0;">
                        <thead>
                            <tr>
                                <th>Tarih</th>
                                <th>Adet</th>
                            </tr>
                        </thead>
                        <tbody id="dailyTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="appointmentSearch" placeholder="Müşteri adı, plaka veya not içeriği yazın..." autocomplete="off">
            </div>
        </div>

        <div class="table-container">
            <table style="margin: 0; width: 100%;">
                <thead>
                    <tr>
                        <th>Müşteri</th>
                        <th>Araç (Plaka)</th>
                        <th>Tarih</th>
                        <th>Not</th>
                        <th style="width: 280px; text-align: center;">Durum Aksiyonu</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>

            <div class="pagination-container">
                <button id="prevPageBtn" class="back-btn" style="margin:0; padding: 8px 16px;">← Önceki</button>
                <span id="pageInfo" style="font-weight: 600; color: #94a3b8; font-size: 14px;">Sayfa 1 / 1</span>
                <button id="nextPageBtn" class="back-btn" style="margin:0; padding: 8px 16px;">Sonraki →</button>
            </div>
        </div>

    </div>

    <script src="../assets/randevu.js"></script>
</body>

</html>
