<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Araçlar</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Eğer body'de .light-theme veya .light sınıfı varsa sol menüyü ayarla */
        
        body.light-theme .sidebar,
        body.light-theme .left-menu,
        .light .sidebar {
            background-color: #f8f9fa !important;
            /* Sol menü arka planı açık gri/beyaz */
            border-right: 1px solid #dee2e6;
        }
        /* Sol menünün içindeki tüm yazıları, linkleri ve başlıkları siyah yap */
        
        body.light-theme .sidebar a,
        body.light-theme .sidebar span,
        body.light-theme .sidebar i,
        body.light-theme .left-menu a,
        body.light-theme .left-menu span {
            color: #212529 !important;
            /* Yazıları görünür koyu füme/siyah yapar */
        }
        /* Fareyle üzerine gelindiğinde (Hover) yazıların rengi */
        
        body.light-theme .sidebar a:hover,
        body.light-theme .left-menu a:hover {
            background-color: #e9ecef !important;
            color: #000000 !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: radial-gradient(circle at top right, #13265d 0%, #071129 40%), #071129;
            font-family: Inter;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .container {
            padding: 30px;
        }
        
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }
        
        .page-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .back-btn {
            border: none;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }
        
        .back-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
        
        .page-title {
            font-size: 34px;
            font-weight: 800;
        }
        
        .add-btn {
            border: none;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            padding: 15px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: .2s;
        }
        
        .add-btn:hover {
            transform: translateY(-3px);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
            gap: 24px;
        }
        
        .card {
            background: rgba(17, 28, 68, .96);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .05);
            transition: .25s;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-6px);
            border-color: #3b82f6;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .35);
        }
        
        .car-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #0f172a;
        }
        
        .content {
            padding: 22px;
        }
        
        .plate {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .owner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, .15);
            color: #93c5fd;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            margin-bottom: 18px;
        }
        
        .info-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        
        .badge {
            background: #1e293b;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            color: #cbd5e1;
        }
        
        .note {
            color: #cbd5e1;
            line-height: 1.6;
            min-height: 50px;
            margin-bottom: 20px;
        }
        
        .detail-btn {
            width: 100%;
            border: none;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
        }
        
        .detail-btn:hover {
            opacity: .9;
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .modal-box {
            width: 550px;
            background: #0f172a;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, .05);
        }
        
        .modal-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
        }
        
        .input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #111827;
            color: white;
            margin-bottom: 16px;
            outline: none;
        }
        
        textarea.input {
            min-height: 120px;
            resize: none;
        }
        
        .save-btn {
            width: 100%;
            border: none;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
        }
        
        .search-input {
            width: 350px;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 14px;
            background: #111827;
            color: white;
            font-size: 15px;
        }
        
        .search-area {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        
        .search-input {
            width: 420px;
            padding: 14px 18px;
            border: none;
            outline: none;
            border-radius: 14px;
            background: #111827;
            color: white;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topbar">

            <div class="page-left">

                <button class="back-btn" onclick="history.back()">
            ← Geri
        </button>

                <div class="page-title">
                    🚗 Araçlar
                </div>

            </div>

            <div class="search-area">

                <input type="text" id="searchInput" class="search-input" placeholder="Plaka, müşteri veya araç ara...">

            </div>

            <button class="add-btn" onclick="openModal()">
        + Araç Ekle
    </button>

        </div>

        <div class="grid" id="vehicleGrid"></div>
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; padding: 30px;">
            <button id="prevPageBtn" class="back-btn" style="margin:0; padding: 12px 24px;">← Önceki Sayfa</button>
            <span id="pageInfo" style="font-weight: 700; color: #94a3b8; font-size: 16px;">Sayfa 1 / 1</span>
            <button id="nextPageBtn" class="back-btn" style="margin:0; padding: 12px 24px;">Sonraki Sayfa →</button>
        </div>

    </div>

    <div class="modal" id="modal">

        <div class="modal-box">

            <div class="modal-title">
                Yeni Araç Ekle
            </div>

            <select id="customer" class="input"></select>

            <input id="plate" class="input" placeholder="Plaka">
            <input id="brand" class="input" placeholder="Marka">
            <input id="model" class="input" placeholder="Model">
            <input id="year" class="input" placeholder="Yıl">
            <input id="vehicleKm" class="input" placeholder="KM">

            <input type="file" id="image" class="input">

            <textarea id="note" class="input" placeholder="Araç Notu"></textarea>

            <button class="save-btn" id="saveBtn">
            Aracı Kaydet
        </button>

        </div>

    </div>

    <script src="../assets/vehicles.js"></script>

</body>

</html>
